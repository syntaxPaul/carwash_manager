name: carwash_manager
description: Offline-first car wash management app (sales, expenses, employees, services, reports)
publish_to: 'none'
version: 1.0.3+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  intl: ^0.19.0
  uuid: ^4.5.1
  share_plus: ^10.0.2
  csv: ^6.0.0
  pdf: ^3.11.0
  printing: ^5.13.4
  geolocator: ^11.1.0
  crypto: ^3.0.3
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.9.0

  # Cupertino icons for iOS style icons
  cupertino_icons: ^1.0.8
  in_app_purchase: ^3.2.3
  http: ^1.6.0
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/carwashes.json
    - assets/illustrations/hero_detailing.svg
    - assets/illustrations/customer_locator.svg
    - assets/branding/
